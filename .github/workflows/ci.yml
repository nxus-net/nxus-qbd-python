name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev,codegen]" --system
      - run: python scripts/generate.py --file spec/openapi.json
      - run: python -c "from nxus_qbd import NxusClient; print('Import OK')"
      - run: pytest --tb=short -q
